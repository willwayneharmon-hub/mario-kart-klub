<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WVU Mario Kart Klub — Join the race at West Virginia University">
  <meta name="theme-color" content="#0a0e1a">
  <title>WVU Mario Kart Klub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="top-bar">
    <button id="sound-toggle" aria-label="Toggle sound" title="Toggle sound">
      <span id="sound-icon">🔇</span>
    </button>
    <a href="#hero" class="skip-link">Skip to content</a>
  </header>

  <main>
    <section id="game-area" aria-label="Mini-game: Banana Dodge">
      <canvas id="game-canvas" width="480" height="320"></canvas>
      <div id="game-a11y" aria-live="polite" class="sr-only"></div>
    </section>

    <section id="hero">
      <h1 class="club-title">WVU Mario Kart <span class="klub-k">K</span>lub</h1>
      <p class="tagline">Where friendships go to die (on Rainbow Road)</p>
      <a href="https://facebook.com/groups/1466129588551632/"
         class="cta-button"
         target="_blank"
         rel="noopener noreferrer">
        Join the Klub
      </a>
    </section>
  </main>

  <footer>
    <p>Built with 🍄 at WVU</p>
  </footer>

  <script src="js/game.js" defer></script>
  <script src="js/main.js" defer></script>
</body>
</html>
